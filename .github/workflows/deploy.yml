name: Build and deploy Hexo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hexo-deployment
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up latest Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run clean && npm run build

      - name: Configure deploy key
        env:
          DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Publish to ttzytt.github.io
        run: |
          git clone --depth 1 git@github.com:ttzytt/ttzytt.github.io.git deploy
          rsync -a --delete --exclude='.git' public/ deploy/

          cd deploy
          git config user.name "ttzytt"
          git config user.email "zyt2006613@outlook.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No generated changes to deploy."
            exit 0
          fi

          source_commit_message="$(git -C "$GITHUB_WORKSPACE" log -1 --format=%B "$GITHUB_SHA")"
          git commit -m "Deploy blog_src@${GITHUB_SHA}" \
            -m "Source commit (${GITHUB_SHA}):"$'\n\n'"${source_commit_message}" \
            -m "Co-authored-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git push origin main
