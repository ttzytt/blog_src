name: Build and deploy Hexo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hexo-deployment
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: ci_tools/uv.lock

      - name: Install multilingual CI project
        run: uv sync --project ci_tools --locked --dev

      - name: Test and validate multilingual content
        run: |
          uv --directory ci_tools run ruff check src tests
          uv --directory ci_tools run ruff format --check src tests
          uv --directory ci_tools run mypy src tests
          uv --directory ci_tools run pytest
          uv --directory ci_tools run multilingual-ci check --project-root ..

      - name: Set up latest Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure deploy key
        env:
          DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Publish to ttzytt.github.io
        run: |
          git clone --depth 1 git@github.com:ttzytt/ttzytt.github.io.git deploy
          rsync -a --delete --exclude='.git' public/ deploy/

          cd deploy
          git config user.name "ttzytt"
          git config user.email "zyt2006613@outlook.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No generated changes to deploy."
            exit 0
          fi

          source_commit_title="$(git -C "$GITHUB_WORKSPACE" log -1 --format=%s "$GITHUB_SHA")"
          source_commit_description="$(git -C "$GITHUB_WORKSPACE" log -1 --format=%b "$GITHUB_SHA")"
          git commit -m "[deploy] $source_commit_title" \
            -m "Source commit: ${GITHUB_SHA}" \
            -m "Co-authored-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>" \
            -m "$source_commit_description"
          git push origin main
